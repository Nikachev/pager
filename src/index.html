<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nice!nano v2 Server</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b, #090514);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 28px;
      padding: 40px 24px;
      text-align: center;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 30px 60px -15px rgba(99, 102, 241, 0.2);
    }
    h1 {
      background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 16px 0 8px 0;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
    }
    p {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      margin: 16px 0 28px 0;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34d399;
      padding: 6px 16px;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    .spec-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 16px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #cbd5e1;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .spec-item {
      display: flex;
      justify-content: space-between;
    }
    .spec-label { color: #64748b; }
    .spec-value { color: #818cf8; font-weight: bold; }

    /* OTA Container & Elements */
    .ota-container {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ota-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #94a3b8;
      text-align: left;
      margin-bottom: 2px;
    }
    .file-label {
      background: rgba(99, 102, 241, 0.06);
      border: 1px dashed rgba(99, 102, 241, 0.3);
      color: #818cf8;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .file-label:hover {
      background: rgba(99, 102, 241, 0.12);
      border-color: rgba(99, 102, 241, 0.5);
    }
    .file-name {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 4px;
    }
    .upload-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      color: white;
      padding: 14px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.5);
    }
    .upload-btn:disabled {
      background: #1e293b;
      color: #475569;
      cursor: not-allowed;
    }
    .progress-bar-bg {
      background: #0f172a;
      height: 8px;
      border-radius: 9999px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-bar-fill {
      background: #10b981;
      width: 0%;
      height: 100%;
      transition: width 0.1s;
      border-radius: 9999px;
    }
    .ota-status {
      font-size: 0.85rem;
      color: #cbd5e1;
      font-weight: 600;
      margin-top: 2px;
    }
    /* New Controls and Logs Styles */
    .control-btn {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 14px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    .control-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
      transform: translateY(-2px);
    }
    .log-console {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 16px;
      height: 180px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.8rem;
      color: #cbd5e1;
      text-align: left;
      white-space: pre-wrap;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .small-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      flex: 1;
    }
    .small-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status-badge">
      <span class="status-dot"></span>Active Server
    </div>
    <h1>nice!nano v2</h1>
    <p>This web page is served dynamically over a USB-Ethernet connection with automatic DHCP setup.</p>

    <div class="spec-container">
      <div class="spec-item"><span class="spec-label">MCU:</span><span class="spec-value">nRF52840 (Cortex-M4F)</span></div>
      <div class="spec-item"><span class="spec-label">Stack:</span><span class="spec-value">Embassy & smoltcp</span></div>
      <div class="spec-item"><span class="spec-label">IP Address:</span><span class="spec-value">192.168.42.1</span></div>
    </div>

    <!-- OTA Firmware Update -->
    <div class="ota-container">
      <div class="ota-title">Firmware Update (Web OTA)</div>
      <label class="file-label" for="file-input">Choose .bin File</label>
      <input type="file" id="file-input" accept=".bin" style="display: none;">
      <span class="file-name" id="file-name">No file selected</span>
      <button class="upload-btn" id="upload-btn" disabled>Flash Firmware</button>
      <div class="progress-bar-bg" id="progress-bg" style="display: none;">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="ota-status" id="ota-status"></div>
    </div>

    <!-- Device Controls -->
    <div class="ota-container">
      <div class="ota-title">Device Controls</div>
      <button class="control-btn" id="bootloader-btn">Reboot to Bootloader</button>
    </div>

    <!-- System Logs -->
    <div class="ota-container">
      <div class="ota-title">System Logs</div>
      <div class="log-console" id="log-console">Loading logs...</div>
      <div class="btn-group">
        <button class="small-btn" id="clear-logs-btn">Clear Logs View</button>
        <button class="small-btn" id="toggle-poll-btn">Pause Auto-Refresh</button>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const uploadBtn = document.getElementById('upload-btn');
    const progressBg = document.getElementById('progress-bg');
    const progressFill = document.getElementById('progress-fill');
    const otaStatus = document.getElementById('ota-status');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        fileName.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
        uploadBtn.disabled = false;
        otaStatus.textContent = '';
      } else {
        fileName.textContent = 'No file selected';
        uploadBtn.disabled = true;
      }
    });

    uploadBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      // Restrict update binary size to 480KB (matches partition limit)
      if (file.size > 480 * 1024) {
        otaStatus.textContent = 'Error: File exceeds 480 KB limit!';
        otaStatus.style.color = '#ef4444';
        return;
      }

      uploadBtn.disabled = true;
      fileInput.disabled = true;
      progressBg.style.display = 'block';
      otaStatus.textContent = 'Uploading firmware...';
      otaStatus.style.color = '#e2e8f0';

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/update', true);

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const percent = (e.loaded / e.total) * 100;
          progressFill.style.width = percent + '%';
        }
      };

      xhr.onload = () => {
        if (xhr.status === 200) {
          otaStatus.textContent = 'Success! Writing to Flash and rebooting in 1s...';
          otaStatus.style.color = '#34d399';
          progressFill.style.background = '#34d399';
        } else {
          otaStatus.textContent = 'Upload failed! Server returned code ' + xhr.status;
          otaStatus.style.color = '#ef4444';
          uploadBtn.disabled = false;
          fileInput.disabled = false;
        }
      };

      xhr.onerror = () => {
        otaStatus.textContent = 'Network error during upload!';
        otaStatus.style.color = '#ef4444';
        uploadBtn.disabled = false;
        fileInput.disabled = false;
      };

      // Send raw file binary buffer
      xhr.send(file);
    });

    // Reboot to Bootloader Control
    const bootloaderBtn = document.getElementById('bootloader-btn');
    bootloaderBtn.addEventListener('click', async () => {
      if (confirm('Are you sure you want to reboot the device to bootloader mode?')) {
        bootloaderBtn.disabled = true;
        try {
          const response = await fetch('/bootloader', { method: 'POST' });
          if (response.ok) {
            bootloaderBtn.textContent = 'Rebooting...';
            alert('Device is rebooting to bootloader mode. Please wait for the board to reconnect.');
          } else {
            alert('Failed to reboot: ' + response.statusText);
            bootloaderBtn.disabled = false;
          }
        } catch (e) {
          alert('Error sending request: ' + e);
          bootloaderBtn.disabled = false;
        }
      }
    });

    // System Logs Polling
    const logConsole = document.getElementById('log-console');
    const togglePollBtn = document.getElementById('toggle-poll-btn');
    const clearLogsBtn = document.getElementById('clear-logs-btn');
    let pollInterval = null;
    let isPolling = true;

    async function fetchLogs() {
      try {
        const response = await fetch('/logs');
        if (response.ok) {
          const text = await response.text();
          logConsole.textContent = text || 'No logs available.';
          logConsole.scrollTop = logConsole.scrollHeight;
        }
      } catch (e) {
        console.error('Error fetching logs:', e);
      }
    }

    function startPolling() {
      fetchLogs();
      pollInterval = setInterval(fetchLogs, 2000);
    }

    function stopPolling() {
      clearInterval(pollInterval);
      pollInterval = null;
    }

    togglePollBtn.addEventListener('click', () => {
      if (isPolling) {
        stopPolling();
        togglePollBtn.textContent = 'Resume Auto-Refresh';
        isPolling = false;
      } else {
        startPolling();
        togglePollBtn.textContent = 'Pause Auto-Refresh';
        isPolling = true;
      }
    });

    clearLogsBtn.addEventListener('click', () => {
      logConsole.textContent = '';
    });

    // Start logs polling automatically
    startPolling();
  </script>
</body>
</html>
