<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nice!nano v2 Server</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b, #090514);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 28px;
      padding: 48px 32px;
      text-align: center;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 30px 60px -15px rgba(99, 102, 241, 0.2);
    }
    h1 {
      background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 16px 0 8px 0;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.025em;
    }
    p {
      color: #94a3b8;
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 16px 0 32px 0;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34d399;
      padding: 6px 16px;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    .spec-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 16px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #cbd5e1;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .spec-item {
      display: flex;
      justify-content: space-between;
    }
    .spec-label { color: #64748b; }
    .spec-value { color: #818cf8; font-weight: bold; }
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status-badge">
      <span class="status-dot"></span>Active Server
    </div>
    <h1>nice!nano v2</h1>
    <p>This web page is served dynamically over a USB-Ethernet connection with automatic DHCP setup.</p>
    <div class="spec-container">
      <div class="spec-item"><span class="spec-label">MCU:</span><span class="spec-value">nRF52840 (Cortex-M4F)</span></div>
      <div class="spec-item"><span class="spec-label'>Stack:</span><span class="spec-value">Embassy & smoltcp</span></div>
      <div class="spec-item"><span class="spec-label">IP Address:</span><span class="spec-value">192.168.42.1</span></div>
    </div>
  </div>
</body>
</html>
