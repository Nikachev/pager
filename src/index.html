<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nice!nano v2</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #6366f1;
      --accent-d: #4338ca;
      --green: #10b981;
      --red: #ef4444;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    h1 { font-size: 1.1rem; margin: 0; font-weight: 700; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--green);
      border: 1px solid rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.08);
      padding: 3px 10px;
      border-radius: 999px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    nav {
      display: flex;
      gap: 4px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 14px;
    }
    nav button {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 9px 4px;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    nav button.active {
      background: var(--accent);
      color: #fff;
    }
    section { display: none; }
    section.active { display: block; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 10px 0;
    }
    label.file {
      display: block;
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }
    label.file:hover { border-color: var(--accent); }
    .fname { font-size: 0.8rem; color: var(--muted); margin: 8px 0; word-break: break-all; }
    button.btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button.btn:hover:not(:disabled) { background: var(--accent-d); }
    button.btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    button.danger {
      background: rgba(239,68,68,0.1);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.3);
    }
    button.danger:hover:not(:disabled) { background: rgba(239,68,68,0.2); }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    button.small {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }
    button.small:hover { background: rgba(255,255,255,0.08); }
    .slots { display: flex; gap: 8px; margin-bottom: 10px; }
    .slot {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .slot .s { display: block; font-weight: 700; }
    .slot .st { font-size: 0.7rem; color: var(--muted); }
    .slot.on { border-color: var(--accent); background: rgba(99,102,241,0.12); color: #c7d2fe; }
    .slot.bonded .st { color: var(--green); }
    input[type=text] {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b0f1a;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }
    input[type=text]:focus { border-color: var(--accent); }
    .status { font-size: 0.8rem; color: var(--muted); margin-top: 8px; min-height: 1.2em; }
    .status.ok { color: var(--green); }
    .status.err { color: var(--red); }
    .sectors { display: none; gap: 2px; margin-top: 8px; }
    .sectors > div { flex: 1; height: 8px; border-radius: 2px; background: #0b0f1a; transition: background 0.1s; }
    .sectors > div.on { background: var(--green); }
    pre {
      background: #0b0f1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      height: 240px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      margin: 0;
    }
    .spec { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); }
    .spec div { display: flex; justify-content: space-between; padding: 2px 0; }
    .spec b { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>nice!nano v2</h1>
      <span class="badge"><span class="dot"></span>Server active</span>
    </header>

    <nav>
      <button id="tab-fw" class="active" onclick="show('fw')">Firmware</button>
      <button id="tab-ble" onclick="show('ble')">Bluetooth</button>
      <button id="tab-dbg" onclick="show('dbg')">Debug</button>
    </nav>

    <!-- FIRMWARE -->
    <section id="sec-fw" class="active">
      <div class="card">
        <h2>Firmware Update (Web OTA)</h2>
        <label class="file" for="file-input">Choose .bin File</label>
        <input type="file" id="file-input" accept=".bin" style="display:none">
        <div class="fname" id="file-name">No file selected</div>
        <button class="btn" id="upload-btn" disabled>Flash Firmware</button>
        <div class="sectors" id="progress-bg"></div>
        <div class="status" id="ota-status"></div>
      </div>
      <div class="card">
        <h2>Bootloader</h2>
        <button class="btn danger" id="bootloader-btn">Reboot to Bootloader</button>
      </div>
    </section>

    <!-- BLUETOOTH -->
    <section id="sec-ble">
      <div class="card">
        <h2>Bluetooth Keyboard</h2>
        <div class="slots">
          <div class="slot" id="slot-0-btn" onclick="switchSlot(0)"><span class="s">Profile 1</span><span class="st" id="slot-0-status">Empty</span></div>
          <div class="slot" id="slot-1-btn" onclick="switchSlot(1)"><span class="s">Profile 2</span><span class="st" id="slot-1-status">Empty</span></div>
          <div class="slot" id="slot-2-btn" onclick="switchSlot(2)"><span class="s">Profile 3</span><span class="st" id="slot-2-status">Empty</span></div>
        </div>
        <div class="row">
          <button class="small" id="pair-btn" onclick="pair()">Pair New Device</button>
          <button class="small" id="unpair-btn" onclick="delBond()" disabled>Delete Bond</button>
        </div>
        <div class="status" id="keyboard-status">Loading state...</div>
      </div>
      <div class="card">
        <h2>Send Text</h2>
        <div class="row">
          <input type="text" id="keyboard-input" placeholder="Type text to send...">
          <button class="btn" id="type-btn" style="flex:0 0 auto;width:auto;padding:10px 18px" onclick="sendText()">Send</button>
        </div>
      </div>
    </section>

    <!-- DEBUG -->
    <section id="sec-dbg">
      <div class="card">
        <h2>Device</h2>
        <div class="spec">
          <div><span>MCU</span><b>nRF52840</b></div>
          <div><span>Stack</span><b>Embassy + smoltcp</b></div>
          <div><span>IP</span><b>192.168.42.1</b></div>
        </div>
      </div>
      <div class="card">
        <h2>System Log</h2>
        <pre id="log-console">Loading logs...</pre>
        <div class="row" style="margin-top:8px">
          <button class="small" id="clear-logs-btn" onclick="clearLogs()">Clear View</button>
          <button class="small" id="toggle-poll-btn" onclick="togglePoll()">Pause Auto-Refresh</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    function show(id) {
      ['fw','ble','dbg'].forEach(s => {
        document.getElementById('sec-'+s).classList.toggle('active', s===id);
        document.getElementById('tab-'+s).classList.toggle('active', s===id);
      });
    }

    // ---- Firmware ----
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const uploadBtn = document.getElementById('upload-btn');
    const progressBg = document.getElementById('progress-bg');
    const otaStatus = document.getElementById('ota-status');
    const SECTORS = 32;

    fileInput.addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (f) {
        fileName.textContent = f.name + ' (' + (f.size/1024).toFixed(1) + ' KB)';
        uploadBtn.disabled = false;
        otaStatus.textContent = '';
      } else {
        fileName.textContent = 'No file selected';
        uploadBtn.disabled = true;
      }
    });

    uploadBtn.addEventListener('click', () => {
      const f = fileInput.files[0];
      if (!f) return;
      if (f.size > 480*1024) {
        otaStatus.textContent = 'Error: File exceeds 480 KB limit!';
        otaStatus.className = 'status err';
        return;
      }
      uploadBtn.disabled = true;
      fileInput.disabled = true;
      progressBg.innerHTML = '';
      for (let i = 0; i < SECTORS; i++) progressBg.appendChild(document.createElement('div'));
      progressBg.style.display = 'flex';
      otaStatus.textContent = 'Uploading firmware...';
      otaStatus.className = 'status';

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/update', true);
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = e.loaded / e.total * 100;
          const filled = Math.round(pct / 100 * SECTORS);
          const segs = progressBg.children;
          for (let i = 0; i < SECTORS; i++) segs[i].classList.toggle('on', i < filled);
          otaStatus.textContent = 'Writing sector ' + filled + ' / ' + SECTORS + ' (' + pct.toFixed(0) + '%)';
        }
      };
      xhr.onload = () => {
        if (xhr.status === 200) {
          const segs = progressBg.children;
          for (let i = 0; i < SECTORS; i++) segs[i].classList.add('on');
          otaStatus.textContent = 'Success! Writing to Flash and rebooting...';
          otaStatus.className = 'status ok';
          // Re-enable controls so a repeat flash is possible after reboot.
          uploadBtn.disabled = false;
          fileInput.disabled = false;
        } else {
          otaStatus.textContent = 'Upload failed! Server returned code ' + xhr.status;
          otaStatus.className = 'status err';
          uploadBtn.disabled = false; fileInput.disabled = false;
        }
      };
      xhr.onerror = () => {
        otaStatus.textContent = 'Network error during upload!';
        otaStatus.className = 'status err';
        uploadBtn.disabled = false; fileInput.disabled = false;
      };
      xhr.send(f);
    });

    const bootloaderBtn = document.getElementById('bootloader-btn');
    bootloaderBtn.addEventListener('click', async () => {
      if (!confirm('Reboot the device to bootloader mode?')) return;
      bootloaderBtn.disabled = true;
      try {
        const r = await fetch('/bootloader', { method: 'POST' });
        if (r.ok) {
          bootloaderBtn.textContent = 'Rebooting...';
          alert('Device is rebooting to bootloader mode. Wait for the board to reconnect.');
        } else {
          alert('Failed to reboot: ' + r.statusText);
          bootloaderBtn.disabled = false;
        }
      } catch (e) {
        alert('Error sending request: ' + e);
        bootloaderBtn.disabled = false;
      }
    });

    // ---- Bluetooth ----
    let activeSlot = 0;
    async function fetchKeyboardState() {
      try {
        const r = await fetch('/keyboard/state');
        if (r.ok) updateKeyboardUI(await r.json());
      } catch (e) { console.error(e); }
    }
    function updateKeyboardUI(state) {
      const statusDiv = document.getElementById('keyboard-status');
      if (state.pairing_mode) {
        statusDiv.innerHTML = '<span style="color:var(--green);font-weight:600">Pairing Mode Active...</span> Search for "nice_nano" on your device.';
      } else {
        statusDiv.textContent = 'Keyboard ready. Select a profile to switch.';
      }
      state.slots.forEach((slot, i) => {
        const btn = document.getElementById('slot-'+i+'-btn');
        const st = document.getElementById('slot-'+i+'-status');
        btn.classList.toggle('on', slot.active);
        btn.classList.toggle('bonded', slot.bonded);
        st.textContent = slot.bonded ? 'Bonded' : 'Empty';
        if (slot.active) {
          activeSlot = i;
          document.getElementById('unpair-btn').disabled = !slot.bonded;
        }
      });
    }
    async function switchSlot(i) {
      try { const r = await fetch('/keyboard/switch?slot='+i, { method:'POST' }); if (r.ok) fetchKeyboardState(); }
      catch (e) { alert('Error switching slot: ' + e); }
    }
    async function pair() {
      try { const r = await fetch('/keyboard/pair', { method:'POST' }); if (r.ok) fetchKeyboardState(); }
      catch (e) { alert('Error enabling pairing mode: ' + e); }
    }
    async function delBond() {
      if (!confirm('Delete the bond for Profile ' + (activeSlot+1) + '?')) return;
      try { const r = await fetch('/keyboard/delete?slot='+activeSlot, { method:'POST' }); if (r.ok) fetchKeyboardState(); }
      catch (e) { alert('Error deleting bond: ' + e); }
    }
    const typeBtn = document.getElementById('type-btn');
    const kbInput = document.getElementById('keyboard-input');
    async function sendText() {
      const text = kbInput.value;
      if (!text) return;
      typeBtn.disabled = true;
      try {
        const r = await fetch('/keyboard/type', { method:'POST', body: text, headers: { 'Content-Type':'text/plain' } });
        if (r.ok) kbInput.value = ''; else alert('Failed to send text: ' + r.statusText);
      } catch (e) { alert('Error sending text: ' + e); }
      finally { typeBtn.disabled = false; }
    }
    kbInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });

    // ---- Debug ----
    const logConsole = document.getElementById('log-console');
    let pollInterval = null, isPolling = true;
    async function fetchLogs() {
      try {
        const r = await fetch('/logs');
        if (r.ok) {
          const t = await r.text();
          logConsole.textContent = t || 'No logs available.';
          logConsole.scrollTop = logConsole.scrollHeight;
        }
      } catch (e) { console.error(e); }
    }
    function startPolling() { fetchLogs(); pollInterval = setInterval(fetchLogs, 2000); }
    function stopPolling() { clearInterval(pollInterval); pollInterval = null; }
    function togglePoll() {
      if (isPolling) { stopPolling(); togglePollBtn.textContent = 'Resume Auto-Refresh'; isPolling = false; }
      else { startPolling(); togglePollBtn.textContent = 'Pause Auto-Refresh'; isPolling = true; }
    }
    const togglePollBtn = document.getElementById('toggle-poll-btn');
    function clearLogs() { logConsole.textContent = ''; }

    // ---- Start ----
    startPolling();
    setInterval(fetchKeyboardState, 2000);
    fetchKeyboardState();
  </script>
</body>
</html>
